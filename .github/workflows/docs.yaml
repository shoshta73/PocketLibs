name: docs

on:
  push:
    paths: ["docs/**"]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        id: cache-cargo
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-mdbook-${{ hashFiles('./.github/workflows/docs.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mdbook-${{ hashFiles('./.github/workflows/docs.yaml') }}

      - name: Cache book.toml web
        uses: actions/cache@v4
        id: cache-book-toml-web
        with:
          path: ./docs/book.toml
          key: ${{ runner.os }}-book-toml-web-${{ hashFiles('./.github/workflows/docs.yaml', './docs/book.web.toml') }}
          restore-keys: |
            ${{ runner.os }}-book-toml-web-${{ hashFiles('./.github/workflows/docs.yaml', './docs/book.web.toml') }}

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: build graphs
        run: cd docs && bash ./build-graphs.sh

      - name: Install mdbook
        if: steps.cache-cargo.outputs.cache-hit != 'true'
        run: |
          if ! command -v mdbook &> /dev/null; then
            cargo install mdbook --version 0.4.52
          fi

      - name: Install mdbook-alerts
        if: steps.cache-cargo.outputs.cache-hit != 'true'
        run: |
          if ! command -v mdbook-alerts &> /dev/null; then
            cargo install mdbook-alerts --version 0.8.0
          fi

      - name: Install mdbook-pdf
        if: steps.cache-cargo.outputs.cache-hit != 'true'
        run: |
          if ! command -v mdbook-pdf &> /dev/null; then
            cargo install mdbook-pdf --version 0.1.11
          fi

      - name: book.toml
        if: steps.cache-book-toml-web.outputs.cache-hit != 'true'
        run: cp docs/book.web.pdf docs/book.toml

      - name: Build docs
        run: cd docs && mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy-docs:
    needs: build-docs
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
